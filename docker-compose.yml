services:
  flashdeck:
    build: .
    container_name: flashdeck
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - flashdeck_data:/data
    extra_hosts:
      # Lets the container reach an Ollama running on the Docker host
      # via http://host.docker.internal:11434 (works on Linux too with this line).
      - "host.docker.internal:host-gateway"

volumes:
  flashdeck_data:
